<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>СФЕРА 3D Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
    canvas { display: block; }

    .sidebar {
      position: absolute; top: 20px; right: 20px; background: rgba(20, 20, 30, 0.95);
      padding: 20px; border-radius: 16px; color: white; width: 320px; z-index: 200;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4); backdrop-filter: blur(10px); text-align: center;
    }

    button {
      width: 100%; padding: 14px; margin: 10px 0; font-size: 15px; font-weight: 600;
      border: none; border-radius: 12px; cursor: pointer; color: white;
    }

    #topViewBtn {
      background: linear-gradient(135deg, #9e9e34, #a5b082);
    }

    .progress-container {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(20, 20, 30, 0.95); padding: 30px 40px; border-radius: 20px;
      color: white; text-align: center; display: none; z-index: 300; min-width: 380px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .progress-bar {
      width: 320px; height: 8px; background: #333; border-radius: 999px;
      overflow: hidden; margin: 20px auto;
    }

    .progress-fill {
      height: 100%; width: 0%; background: linear-gradient(90deg, #00f2fe, #4facfe);
      transition: width 0.2s ease; border-radius: 999px;
    }

    #progressText {
      font-size: 16px;
      font-weight: 500;
      margin: 0;
      color: #ccc;
    }

    .title {
      margin: 0 0 18px 0;          /* Отступ снизу */
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;    /* Делает текст "КВАРТИРА №1" более стильно */
      color: #ffffff;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h3 class="title">2-комнатная квартира</h3>
    <button id="topViewBtn">Вид сверху</button>
  </div>

  <div class="progress-container" id="progressContainer">
    <h3>Загрузка модели...</h3>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <p id="progressText">0%</p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/DRACOLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>

  <script>
    // ===================== GitHub =====================
    const MODEL_URL = 'https://git-apart1.netlify.app/apart_1.glb';
    // ===================================================

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#ebebeb');

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 12, 20);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.6;
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;
    controls.enableZoom = true;
    controls.minDistance = 5;
    controls.maxDistance = 80;
    controls.minPolarAngle = 0.3;
    controls.maxPolarAngle = 1.35;

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(20, 40, 20);
    dirLight.castShadow = true;
    scene.add(dirLight);

    let model = null;

    // Кнопка "Вид сверху"
    document.getElementById('topViewBtn').addEventListener('click', () => {
      if (!model) return;

      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());

      camera.position.set(center.x, center.y + 14, center.z);
      camera.lookAt(center.x, center.y + 5, center.z);
      controls.target.set(center.x, center.y, center.z);
      controls.update();
    });

    // Автоматическая загрузка модели с GitHub
    function loadModelFromGitHub(url) {
      const progressContainer = document.getElementById('progressContainer');
      const progressFill = document.getElementById('progressFill');
      const progressText = document.getElementById('progressText');

      progressContainer.style.display = 'block';
      progressFill.style.width = '0%';
      progressText.textContent = '0%';

      const loader = new THREE.GLTFLoader();
      const dracoLoader = new THREE.DRACOLoader();
      dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/libs/draco/');
      loader.setDRACOLoader(dracoLoader);

      loader.load(
        url,
        (gltf) => onModelLoaded(gltf, progressContainer),
        (xhr) => updateProgress(xhr, progressFill, progressText),
        onError
      );
    }

    function onModelLoaded(gltf, progressContainer) {
      if (model) scene.remove(model);
      model = gltf.scene;

      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      const scale = 14 / Math.max(size.x, size.y, size.z);

      model.scale.set(scale, scale, scale);
      model.position.set(-8, 0, 0);

      model.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });

      scene.add(model);
      progressContainer.style.display = 'none';

      camera.position.set(0, 12, 10);
      controls.target.set(0, 4, 0);
      controls.update();
    }

    function updateProgress(xhr, progressFill, progressText) {
      if (xhr.lengthComputable) {
        const percent = Math.round((xhr.loaded / xhr.total) * 100);
        progressFill.style.width = percent + '%';
        progressText.textContent = percent + '%';
      }
    }

    function onError(error) {
      console.error(error);
      alert("Ошибка загрузки модели с GitHub");
      document.getElementById('progressContainer').style.display = 'none';
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Запуск автоматической загрузки
    animate();
    loadModelFromGitHub(MODEL_URL);
  </script>
</body>
</html>
